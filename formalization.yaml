# formalization.yaml (v0.3) — see https://github.com/mathlib-initiative/formalization.yaml
version: "v0.3"

project:
  name: "unico-lean-proofs"
  authors:
    - "Claude (Anthropic) — formalization"
    - "Solarys431 — direction and operation of the pipeline"
  license: "Apache-2.0"

sources:
  - title: "The Platonic solids classification, local Schläfli types (Wiedijk #50)"
    authors:
      - "Euclid (Elements XIII.18 and scholium)"
    id: "https://en.wikipedia.org/wiki/Platonic_solid"
    type: "classical theorem (antiquity)"
    license: "public domain"
    author_contacted: "n/a"
    prior_work: >-
      Independent formalization (2026-07-17). The geometric theorem exists in
      HOL Light (Harrison). In Lean, only numerological versions were available
      (Schläfli pairs as bare naturals with the inequality postulated, e.g. in
      rjwalters/lean-genius). A related but stronger problem on the lean-eval
      leaderboard (dimension-by-dimension platonicCount, with flag transitivity
      and similarity) is a different, larger target that this work does not
      claim. Our statement lives on an abstract real inner-product space:
      facet regularity defined by isometry orbit (no postulated angles), vertex
      fans as pure incidence structure, the angular inequality derived, plus a
      certified tetrahedron witness. Scope: necessity of the five pairs and one
      existence witness (local classification), not the enumeration of all five
      solids.
  - title: "The Sylvester–Gallai theorem"
    authors:
      - "James Joseph Sylvester"
      - "Tibor Gallai"
    id: "https://en.wikipedia.org/wiki/Sylvester%E2%80%93Gallai_theorem"
    type: "classical theorem (conjectured 1893, proved 1944; Kelly's proof 1948)"
    license: "public domain"
    author_contacted: "n/a"
    prior_work: >-
      Independent proof (2026-07-14). Not in mathlib; chapter 11 of the Formal Book
      project is an open TODO. A Lean 3 development exists (Happyves/Master_Thesis,
      containing a sorry). In Lean 4, YaelDillies/misc-yd proves the Sylvester–Chvátal
      theorem (Chen 2006, finite metric spaces, betweenness lines); its Euclidean
      corollary is sketched there in a commented-out block with a sorry. Our route:
      Kelly's proof made purely vectorial (inner product only), pigeonhole isolated
      over the reals, minimum taken over point triples so that the distance notion
      matches the core lemma by construction.
  - title: "Feuerbach's theorem (Wiedijk #29)"
    authors: ["Karl Wilhelm Feuerbach"]
    id: "https://www.cs.ru.nl/~freek/100/ (entry 29)"
    type: "classical theorem (1822)"
    license: "public domain"
    author_contacted: "n/a"
    prior_work: "Independent proof (2026-07-13), not built on prior formalizations. Other systems: HOL Light (John Harrison, Groebner bases), Rocq (CertiGeo team, reflexive external certificates), Isabelle/HOL (Lawrence C. Paulson, 2026-05, AI-assisted translation of the HOL Light proof). Our route: tangential normalization to the unit circle + barycentric sign certificates (rational identities closed by linear_combination with sympy-generated cofactors); branch pinning from mathlib excenterWeights signs. Design consulting and adversarial gating by gpt-5.6-sol (OpenAI); proof engineering by Claude (Anthropic)."
  - title: "Morley's trisector theorem (Wiedijk #84)"
    authors: ["Frank Morley"]
    id: "https://www.cs.ru.nl/~freek/100/ (entry 84)"
    type: "classical theorem (1899)"
    license: "public domain"
    author_contacted: "n/a"
    prior_work: "none built upon; independent formalization. In Lean, the leanprover lean-eval benchmark geometric morley_theorem had already been solved by several AI systems between 2026-06-10 and 2026-07-11 (https://leanprover.github.io/lean-eval-leaderboard/problems/morley_theorem — kindly pointed out by Jeremy Chen on the Lean Zulip within an hour of our announcement; record corrected 2026-07-13). Partial trigonometric identities (no points/rays/intersections) in https://github.com/rjwalters/lean-genius. Other systems: HOL Light (Harrison), Isabelle (Puyobro), Rocq (Guilhot), Mizar (Coghetto)"
  - title: "A new proof of Morley's theorem"
    authors: ["Alain Connes"]
    id: "https://doi.org/10.1007/BF02698689"
    type: "paper (Publ. Math. IHÉS S88, 1998) — proof-strategy inspiration (cube-roots-of-unity equilaterality criterion)"
    author_contacted: "no"
  - title: "Erdős Problem 1064 (variant k2) and Erdős Problem 1148"
    authors: ["Paul Erdős (problems); Grytczuk–Luca–Wójtowicz (1064 informal solution)"]
    id: "https://www.erdosproblems.com/1064"
    type: "problem-list entries"
    author_contacted: "n/a"

status:
  scope: >-
    Small standalone repository of machine-verified results produced by an
    autonomous certification pipeline. Three main objects: the Sylvester–Gallai theorem (finite non-collinear point sets admit an ordinary line, proved in any real inner-product torsor with no dimension hypothesis); Feuerbach's theorem
    (Wiedijk #29), in the classical two-part form, stated in an abstract
    2-dimensional Euclidean plane; and a geometric formalization of Morley's
    trisector theorem in the complex plane (public statement with trisectors
    as rays, plus existence/uniqueness and non-degeneracy companions); and the
    local Schläfli-type classification of the Platonic solids in an abstract
    3-dimensional real inner-product space (necessity of the five (p,q) pairs,
    facet regularity defined by isometry orbit, with a certified tetrahedron
    witness). Also contains two Erdős-problem items.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms: ["propext", "Classical.choice", "Quot.sound", "Lean.ofReduceBool (Erdos1148Counterexample only, via native_decide)"]
  main_results:
    - declaration: "SylvesterGallai.sylvester_gallai"
      file: "UnicoProofs/SylvesterGallai.lean"
      sorry_count: 0
      axioms:
        - propext
        - Classical.choice
        - Quot.sound
    - declaration: "feuerbach_insphere"
      file: "UnicoProofs/Feuerbach/Main.lean"
      sorry_count: 0
      axioms: ["propext", "Classical.choice", "Quot.sound"]
    - declaration: "feuerbach_exsphere"
      file: "UnicoProofs/Feuerbach/Main.lean"
      sorry_count: 0
      axioms: ["propext", "Classical.choice", "Quot.sound"]
    - declaration: "morley_classico"
      file: "UnicoProofs/Morley.lean"
      sorry_count: 0
      axioms: ["propext", "Classical.choice", "Quot.sound"]
    - declaration: "morley_esistenza_classico"

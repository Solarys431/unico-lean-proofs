automation:
  methods:
    - method: "agent"
      models: ["claude (Anthropic, 2026 models)", "gpt-5.6-sol (OpenAI, adversarial gating only)"]
      framework: "Claude Code"
      tool_setup: >-
        Feuerbach: prior-art gate → derivation of the algebraic identities in
        sympy → adversarial review of the intended route by an independent LLM
        (gpt-5.6-sol), which found four gaps in the first plan; all were
        addressed before any Lean was written → proof construction, kernel as
        sole gatekeeper. Route: a tangential normalization sending the in- or
        excircle to the unit circle, so the three touchpoints have modulus one
        and parametrize the configuration; barycentric sign certificates
        (derived from mathlib's excenterWeights) pin the sign of the tangency
        parameter W; extracted metric lemmas turn that sign into internal
        tangency (W ≤ −1) or external tangency. The rational identities are
        closed by linear_combination with sympy-generated cofactors. The
        statement reuses mathlib's own notions throughout (ninePointCircle,
        insphere/exsphere, IsIntTangent/IsExtTangent), so nothing about the
        objects being related is defined by us.
      cost:
        wall_time: "Feuerbach: ~3.5 h end-to-end (2026-07-13, 20:09–23:35 CEST), first module to both final theorems"
        spend_usd: "subscription-based usage"
        hardware: "consumer Apple Silicon machine; models API-only"
    - method: "agent"
      models: ["claude (Anthropic, 2026 models)"]
      framework: "Claude Code"
      tool_setup: >-
        Autonomous pipeline: target selection → numeric falsification (Python)
        → proof construction with exact symbolic cofactors (sympy computes the
        certificates for linear_combination steps) → local Lean kernel
        certifier as sole gatekeeper → public CI re-verification. Adversarial
        design/fidelity reviews by an independent LLM (OpenAI Codex, gpt-5.6)
        at architecture checkpoints. Morley: layered development (algebraic
        core, trigonometric bridge, ray-intersection lemma, arg toolkit,
        assembly), each layer kernel-certified separately before composition.
      cost:
        wall_time: "Morley: ~1 day end-to-end (design + proof + hardening); ~19 kernel verdicts"
        spend_usd: "subscription-based usage"
        hardware: "consumer Apple Silicon machine; models API-only"
    - method: "agent"
      models: ["aristotle (Harmonic)", "claude (Anthropic)"]
      framework: "Harmonic Aristotle; Claude Code"
      tool_setup: "Erdős items: Aristotle produced the 1064-k2 proof; Claude produced the 1148 native_decide certificate."
  spend_usd: "subscription-based usage"
  notes: >-
    All mathematics is AI-generated under human direction; the human operator
    is not a mathematician. The Lean kernel is the sole arbiter: nothing is
    published unless it compiles with zero sorries.

fidelity:
  divergences: >-
    Feuerbach: stated in an abstract Euclidean plane — a real inner-product
    space V with [Fact (finrank ℝ V = 2)] and its affine torsor P — not in ℂ.
    No non-degeneracy hypothesis appears: Affine.Triangle carries affine
    independence by construction. The circle in the statement is mathlib's own
    Affine.Simplex.ninePointCircle, whose defining incidences are already
    library theorems (faceOppositeCentroid_mem_ninePointCircle for the three
    side midpoints, altitudeFoot_mem_ninePointCircle for the three feet of the
    altitudes, eulerPoint_mem_ninePointCircle for the three Euler points), and
    tangency is mathlib's Sphere.IsIntTangent / Sphere.IsExtTangent. Neither
    the circle nor the tangency predicates are ours, so the statement is
    Feuerbach's theorem itself and not an assertion about a circle we defined.
    The incircle is the empty-signs excircle (t.insphere = t.exsphere ∅,
    definitionally), which is how the four tangencies share one proof.
    Both halves of the classical statement are covered (internal tangency to
    the incircle; external tangency to each of the three excircles). What is
    NOT claimed: the points of tangency are not named or identified — the
    Feuerbach point does not appear in the statement.

    Morley: stated in the complex plane ℂ rather than an abstract Euclidean
    plane. Trisectors are open rays (vertex excluded) with direction obtained
    by rotating the side by one third of the signed angle (Complex.arg), so a
    single definition covers both orientations. Conclusion is equality of the
    three side lengths (dist), with pairwise distinctness as a separate
    companion theorem; non-collinearity hypothesis given both as
    ¬ Collinear ℝ {A, B, C} and as the equivalent im ((C−A)/(B−A)) ≠ 0.
    Identifiers and inline comments are in Italian; file headers in English.

review:
  status: "self-assessed + agent-reviewed; community review requested for Morley, not yet for Feuerbach or Sylvester–Gallai"
  reviewers:
    - "Lean kernel (local certifier + GitHub Actions CI on pinned toolchain v4.32.0-rc1)"
    - "OpenAI Codex gpt-5.6 (adversarial statement-fidelity review, xhigh reasoning)"
  notes: >-
    Kernel-checked on two independent machines. Statement fidelity (does the
    formal statement say what Morley's theorem says?) adversarially reviewed
    by an independent LLM, which found no loopholes. Community review
    requested on the Lean Zulip (topic "Morley's theorem (#84): AI-generated
    proof, please check", 2026-07-13; moved to #AI authored projects).
    First community feedback (J. Chen): the statement "looks okay" at first
    glance, stated in ℂ rather than in full generality (abstract Euclidean
    spaces suggested as future work); lean-eval prior art pointed out and
    acknowledged, record corrected the same day.

    Feuerbach: kernel-checked locally and re-verified by GitHub Actions CI on
    the same pinned toolchain. The proof route was adversarially reviewed by an
    independent LLM (gpt-5.6-sol) BEFORE construction, which rejected the first
    plan (four gaps). Community review has NOT yet been requested for
    Feuerbach; the statement is, however, in the abstract Euclidean generality
    that the Morley feedback suggested as future work.

alignment:
  namespace: ""
  statements:
    - source: "Sylvester–Gallai: a finite set of points, not all collinear, admits a line through exactly two of them"
      lean: "SylvesterGallai.sylvester_gallai"
      module: "UnicoProofs/SylvesterGallai.lean"
      status: "proved"
    - source: "Feuerbach's theorem, internal part: the nine-point circle of a triangle is internally tangent to its incircle"
      lean: "feuerbach_insphere"
      module: "UnicoProofs/Feuerbach/Main.lean"
      status: "proved"
    - source: "Feuerbach's theorem, external part: the nine-point circle is externally tangent to each of the three excircles"
      lean: "feuerbach_exsphere"
      module: "UnicoProofs/Feuerbach/Main.lean"
      status: "proved"
    - source: "Morley's trisector theorem (adjacent trisectors of a non-degenerate triangle meet in an equilateral triangle)"
      lean: "morley_classico"
      module: "UnicoProofs/Morley.lean"
      status: "proved"
    - source: "Existence and uniqueness of each adjacent-trisector intersection"
      lean: "morley_esistenza_classico"
      module: "UnicoProofs/Morley.lean"
      status: "proved"
    - source: "The Morley triangle is non-degenerate (three pairwise distinct points)"
      lean: "morley_non_degenere_classico"
      module: "UnicoProofs/Morley.lean"
      status: "proved"
    - source: "Platonic classification (local Schläfli types): a 3-dimensional convex polytope with orbit-regular p-gonal facets and q-cyclic vertices satisfies q(p-2) < 2p, so (p,q) is one of the five Platonic pairs"
      lean: "cyclicallyRegular_schlafli"
      module: "UnicoProofs/Platonici/Classificazione.lean"
      status: "proved"
    - source: "Non-vacuity of the Platonic classification: the regular tetrahedron satisfies the predicate for (3,3)"
      lean: "tetraedro_cyclicallyRegular"
      module: "UnicoProofs/Platonici/TetraedroStadio2.lean"
      status: "proved"
    - source: "Existence of all five Platonic solids as cyclically regular polytopes: cube (4,3), octahedron (3,4), dodecahedron (5,3), icosahedron (3,5)"
      lean: "cubo_cyclicallyRegular, ottaedro_cyclicallyRegular, dodecaedro_cyclicallyRegular, icosaedro_cyclicallyRegular"
      module: "UnicoProofs/Platonici/ (witness modules)"
      status: "proved"
    - source: "Characterization: a type (p,q) is realizable by a cyclically regular polytope iff it is one of the five Platonic pairs"
      lean: "realizzabile_iff"
      module: "UnicoProofs/Platonici/Realizzabilita.lean"
      status: "proved"
    - source: "Every full-dimensional polytope has a flag; flags exist through any prescribed vertex or facet"
      lean: "flag_exists, bandiera_al_vertice, bandiera_con_faccetta"
      module: "UnicoProofs/Platonici/ScalaBandiere.lean, BandieraVertice.lean, TrasportoFaccetta.lean"
      status: "proved"
    - source: "Uniqueness of the flag transporter: a symmetry fixing a flag is the identity"
      lean: "simmetria_fissa_bandiera, trasportatore_unico"
      module: "UnicoProofs/Platonici/Liberta.lean"
      status: "proved"
    - source: "Diamond property in dimension 3, both directions: every edge lies in exactly two facets"
      lean: "spigolo_in_due_faccette, seconda_faccetta"
      module: "UnicoProofs/Platonici/Diamante.lean, SecondaFaccetta.lean"
      status: "proved"
    - source: "Connectivity of the facet fan around any vertex"
      lean: "ventaglio_connesso"
      module: "UnicoProofs/Platonici/ConnessioneVentaglio.lean"
      status: "proved"
    - source: "Every vertex of a regular 3-polytope is q-cyclic for some q at least 3"
      lean: "verticeCiclico_del_regolare"
      module: "UnicoProofs/Platonici/VerticeCiclico.lean"
      status: "proved"
    - source: "Every facet of a regular 3-polytope is an orbit-regular p-gon"
      lean: "faccetta_regolare"
      module: "UnicoProofs/Platonici/FaccettaRegolare.lean"
      status: "proved"
    - source: "Bridge: every flag-transitive 3-polytope is cyclically regular of some type (p,q), and (p,q) is one of the five Platonic pairs"
      lean: "ponte_regolare, regolare_schlafli"
      module: "UnicoProofs/Platonici/Ponte.lean"
      status: "proved"

